<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-it Virtual</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Estilização do Post-it */
        .post-it {
            background-color: #fffa90; /* Amarelo clássico */
            width: 250px;
            height: 250px;
            padding: 20px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.15);
            border-bottom-right-radius: 20px 5px; /* Efeito de bordinha dobrada */
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .post-it:hover {
            transform: scale(1.02) rotate(1deg);
        }

        /* Área de texto onde você pode digitar */
        .post-it textarea {
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            font-family: 'Comic Sans MS', cursive, sans-serif; /* Fonte estilo escrita à mão */
            font-size: 18px;
            color: #333;
            flex-grow: 1;
            line-height: 1.5;
        }

        /* Rodapé do Post-it (opcional, para dar um charme) */
        .post-it-footer {
            text-align: right;
            font-size: 12px;
            color: #888;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="post-it">
        <textarea placeholder="Digite sua nota aqui..."></textarea>
        <div class="post-it-footer">Clique para editar</div>
    </div>

</body>
</html>
